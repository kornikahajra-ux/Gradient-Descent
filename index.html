<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Volunteer Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 0.9em; }
        label { font-weight: bold; color: #34495e; font-size: 0.9em; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        .loader { text-align: center; color: #e67e22; font-weight: bold; display: none; }
        .card { border-left: 5px solid #2980b9; background: #f9fbfd; padding: 15px; margin: 15px 0; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .score { float: right; background: #e8f8f5; color: #1abc9c; padding: 4px 8px; border-radius: 20px; font-weight: bold; font-size: 0.85em; }
        .urgent { border-left-color: #e74c3c; }
        .urgent .score { background: #fdedec; color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Volunteer Matcher</h2>
    <p class="subtitle">AI-Powered Community Impact</p>
    
    <label>Your Name</label>
    <input type="text" id="name" placeholder="E.g., Gatik Singh" required>
    
    <label>Your Top Skill</label>
    <select id="skill">
        <option value="First Aid">First Aid</option>
        <option value="Logistics">Logistics</option>
        <option value="Teaching">Teaching</option>
        <option value="IT Support">IT Support</option>
        <option value="Cooking">Cooking</option>
    </select>
    
    <label>Availability</label>
    <select id="avail">
        <option value="Full-time">Full-time (Emergency Ready)</option>
        <option value="Weekday">Weekday (9-5)</option>
        <option value="Weekend">Weekend / Evening</option>
    </select>
    
    <button onclick="findMatches()">Find My Best Matches</button>

    <div id="loader" class="loader">Locating you & calculating AI matches...</div>
    <div id="results"></div>
</div>

<script>
async function findMatches() {
    const resultsDiv = document.getElementById('results');
    const loader = document.getElementById('loader');
    
    resultsDiv.innerHTML = "";
    loader.style.display = "block";

    // 1. Get User's Live GPS Location
    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser");
        loader.style.display = "none";
        return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
        // 2. Prepare data to send to Python backend
        const payload = {
            name: document.getElementById('name').value,
            skills: [document.getElementById('skill').value],
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            availability: document.getElementById('avail').value
        };

        try {
            // 3. Call the Python API
            const response = await fetch('http://localhost:8000/recommend', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            const matches = await response.json();
            loader.style.display = "none";
            
            if (matches.length === 0) {
                resultsDiv.innerHTML = "<p>No immediate tasks found nearby. We'll notify you!</p>";
                return;
            }

            // 4. Display the results
            resultsDiv.innerHTML = "<h3>Top Tasks Near You:</h3>";
            matches.forEach(m => {
                // Highlight urgent medical/crisis tasks
                const isUrgent = m.urgency >= 4 ? "urgent" : "";
                
                resultsDiv.innerHTML += `
                    <div class="card ${isUrgent}">
                        <span class="score">${m.match_score}% Match</span>
                        <strong style="font-size: 1.1em;">${m.ngo_name}</strong><br>
                        <span style="color: #555;">Needs: <strong>${m.skill}</strong></span><br>
                        <span style="font-size: 0.9em; color: #777;">📍 ${m.distance} km away</span>
                    </div>`;
            });
        } catch (error) {
            console.error("Error:", error);
            loader.style.display = "none";
            resultsDiv.innerHTML = "<p style='color:red;'>Could not connect to the AI server. Is main.py running?</p>";
        }
    });
}
</script>

</body>
</html>
